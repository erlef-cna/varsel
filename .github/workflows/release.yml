name: Release

on:
  push:
    branches:
      - main
      # TODO: remove before merging — only here to test the workflow on the PR branch
      - test-deployment
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  container:
    name: Build & Push Container
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    permissions:
      contents: read
      packages: write
      # Sigstore attestations (SBOM + provenance) via GitHub OIDC.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          # The mix release derivation opts out of the sandbox for network
          # access (hex, npm, tailwind/esbuild downloads, the heroicons git
          # dependency); see nix/release.nix.
          extra_nix_config: sandbox = relaxed

      # Persist the Nix store across runs via the GitHub cache: the beam
      # toolchain and the staged dependency derivations (npm, deps.get,
      # deps.compile — see nix/release.nix) are reused until their inputs
      # change; only the final release stage rebuilds per commit.
      # Cache-poisoning: writes to this branch-scoped cache require push
      # access, which matches this repo's trust boundary.
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7 # zizmor: ignore[cache-poisoning]
        with:
          primary-key: nix-release-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix', 'nix/*.nix', 'mix.exs', 'mix.lock', 'assets/package-lock.json', 'config/*.exs') }}
          restore-prefixes-first-match: nix-release-${{ runner.os }}-
          gc-max-store-size-linux: 4G
          purge: true
          purge-prefixes: nix-release-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: devenv

      # Two tags per push: the git SHA as an immutable reference, plus a
      # moving pointer — `main` for the main branch, the tag name (vX.Y.Z)
      # for version tags. github.ref_name is exactly that for both. The
      # image builds once; the second copy-to reuses it from the store, and
      # ghcr deduplicates the shared blobs.
      - name: Build & push to GitHub Container Registry
        id: push
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          MOVING_TAG: ${{ github.ref_name }}
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The runner ships a v1 /etc/containers/registries.conf that skopeo
          # rejects. Point it at an empty (valid v2) config instead.
          : > "${RUNNER_TEMP}/registries.conf"
          export CONTAINERS_REGISTRIES_CONF="${RUNNER_TEMP}/registries.conf"

          for tag in "${GITHUB_SHA}" "${MOVING_TAG}"; do
            nix run .#copy-to -- \
              "docker://${IMAGE}:${tag}" \
              --digestfile "${RUNNER_TEMP}/digest" \
              --dest-creds="${REGISTRY_USER}:${REGISTRY_TOKEN}"
          done

          # Same image, same digest for both tags; the attestation steps
          # below need it to address the image in the registry.
          echo "digest=$(cat "${RUNNER_TEMP}/digest")" >> "$GITHUB_OUTPUT"

      # One CycloneDX SBOM covering all three dependency worlds: hex deps
      # (mix_sbom escript) and npm deps from the nix build (see
      # nix/release.nix), the image's nix closure via sbomnix.
      - name: Generate SBOM
        env:
          VERSION: ${{ github.sha }}
        run: |
          nix build .#sbom-deps --out-link sbom-deps
          image="$(nix build .#container --no-link --print-out-paths)"
          nix run --inputs-from . sbomnix#sbomnix -- "$image" \
            --cdx nix.cdx.json --csv /dev/null --spdx /dev/null
          nix run --inputs-from . nixpkgs#cyclonedx-cli -- merge \
            --input-files sbom-deps/mix.cdx.json sbom-deps/npm.cdx.json nix.cdx.json \
            --output-file varsel.cdx.json \
            --name varsel --version "${VERSION}"

      # Sigstore attestations via GitHub's instance, pushed to ghcr as OCI
      # referrers of the image: the merged SBOM and build provenance.
      # Verify with `gh attestation verify oci://ghcr.io/... -o erlef-cna`.
      # The attest actions read registry credentials from the docker config
      # (the skopeo push above uses its own), so log in first.
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          predicate-type: https://cyclonedx.org/bom
          predicate-path: varsel.cdx.json
          push-to-registry: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # main deploys to the `test` environment (varsel-test), v* tags to
  # `production` (varsel-prod); the environment key ties the run to GitHub
  # deployments and scopes the secrets/variables. All non-derived app
  # configuration lives in the GitHub environment (secrets pushed to Fly as
  # staged secrets, variables passed as --env); DATABASE_URL is Fly-managed
  # via the attached Managed Postgres.
  deploy:
    name: Deploy
    needs: container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    environment:
      name: ${{ github.ref_type == 'tag' && 'production' || 'test' }}
      url: https://${{ vars.PHX_HOST }}
    defaults:
      run:
        shell: nix develop --no-pure-eval -c bash -e {0}
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_APP: ${{ vars.FLY_APP }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      # Fly machines cannot pull from private registries, so mirror the
      # digest-pinned image into the app's Fly registry slot.
      - name: Push image to the Fly registry
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          DIGEST: ${{ needs.container.outputs.digest }}
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          : > "${RUNNER_TEMP}/registries.conf"
          export CONTAINERS_REGISTRIES_CONF="${RUNNER_TEMP}/registries.conf"

          skopeo copy \
            --src-creds "${REGISTRY_USER}:${REGISTRY_TOKEN}" \
            --dest-creds "x:${FLY_API_TOKEN}" \
            "docker://${IMAGE}@${DIGEST}" \
            "docker://registry.fly.io/${FLY_APP}:${GITHUB_SHA}"

      # Empty values are skipped so an unset GitHub secret/variable surfaces
      # as the app's own missing-variable error instead of an empty string.
      - name: Stage app secrets
        env:
          CLOAK_KEY: ${{ secrets.CLOAK_KEY }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          MITRE_CVE_API_KEY: ${{ secrets.MITRE_CVE_API_KEY }}
          OAUTH_GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TOKEN_SIGNING_SECRET: ${{ secrets.TOKEN_SIGNING_SECRET }}
        run: |
          pairs=()
          add() { if [ -n "$2" ]; then pairs+=("$1=$2"); fi; }
          add CLOAK_KEY "${CLOAK_KEY}"
          add SECRET_KEY_BASE "${SECRET_KEY_BASE}"
          add TOKEN_SIGNING_SECRET "${TOKEN_SIGNING_SECRET}"
          add MITRE_CVE_API_KEY "${MITRE_CVE_API_KEY}"
          add GITHUB_CLIENT_SECRET "${OAUTH_GITHUB_CLIENT_SECRET}"
          add SMTP_USER "${SMTP_USER}"
          add SMTP_PASSWORD "${SMTP_PASSWORD}"
          if [ "${#pairs[@]}" -gt 0 ]; then
            flyctl secrets set --stage --app "${FLY_APP}" "${pairs[@]}"
          fi

      - name: Deploy
        env:
          PHX_HOST: ${{ vars.PHX_HOST }}
          MITRE_CVE_API_BASE_URL: ${{ vars.MITRE_CVE_API_BASE_URL }}
          MITRE_CVE_API_ORG: ${{ vars.MITRE_CVE_API_ORG }}
          MITRE_CVE_API_USER: ${{ vars.MITRE_CVE_API_USER }}
          OAUTH_GITHUB_CLIENT_ID: ${{ vars.OAUTH_GITHUB_CLIENT_ID }}
          OAUTH_GITHUB_REDIRECT_URI: ${{ vars.OAUTH_GITHUB_REDIRECT_URI }}
          TEST_DEPLOYMENT: ${{ vars.TEST_DEPLOYMENT }}
          CNA_EMAIL_FROM: ${{ vars.CNA_EMAIL_FROM }}
          SMTP_RELAY_HOST: ${{ vars.SMTP_RELAY_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          POOL_SIZE: ${{ vars.POOL_SIZE }}
        run: |
          args=()
          add() { if [ -n "$2" ]; then args+=(--env "$1=$2"); fi; }
          add PHX_HOST "${PHX_HOST}"
          add MITRE_CVE_API_BASE_URL "${MITRE_CVE_API_BASE_URL}"
          add MITRE_CVE_API_ORG "${MITRE_CVE_API_ORG}"
          add MITRE_CVE_API_USER "${MITRE_CVE_API_USER}"
          add GITHUB_CLIENT_ID "${OAUTH_GITHUB_CLIENT_ID}"
          add GITHUB_REDIRECT_URI "${OAUTH_GITHUB_REDIRECT_URI}"
          add TEST_DEPLOYMENT "${TEST_DEPLOYMENT}"
          add CNA_EMAIL_FROM "${CNA_EMAIL_FROM}"
          add SMTP_RELAY_HOST "${SMTP_RELAY_HOST}"
          add SMTP_PORT "${SMTP_PORT}"
          add POOL_SIZE "${POOL_SIZE}"

          flyctl deploy --app "${FLY_APP}" \
            --image "registry.fly.io/${FLY_APP}:${GITHUB_SHA}" \
            "${args[@]}"
