name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  container:
    name: Build & Push Container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        shell: devenv shell bash -- -e {0}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          elixir: true
          mix-env: prod

      - name: Build assets
        env:
          MIX_ENV: prod
        run: |
          mix assets.deploy

      - name: Assemble mix release
        env:
          MIX_ENV: prod
        run: |
          mix release --overwrite
          rm -rf container/release
          mkdir -p container
          cp -r _build/prod/rel/varsel container/release

      # Image tags: the git SHA always, plus `edge` for main / the version for
      # a v* tag. The SHA gives an immutable reference; the other is a moving
      # pointer.
      - name: Determine image tags
        id: tag
        shell: bash
        run: |
          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "moving=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "moving=edge" >> "$GITHUB_OUTPUT"
          fi

      # nix2container images expose a `copyTo` script (skopeo under the hood).
      # `devenv build` prints a JSON map of attr -> store path on stdout (logs
      # go to stderr), so pull the path out with jq.
      - name: Build container push script
        id: image
        run: |
          out="$(devenv build outputs.container.copyTo 2>/dev/null \
                 | jq -r '."outputs.container.copyTo"')"
          test -x "$out/bin/copy-to"
          echo "copy=$out/bin/copy-to" >> "$GITHUB_OUTPUT"

      - name: Push to GitHub Container Registry
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          COPY: ${{ steps.image.outputs.copy }}
          SHA_TAG: ${{ steps.tag.outputs.sha }}
          MOVING_TAG: ${{ steps.tag.outputs.moving }}
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The runner ships a v1 /etc/containers/registries.conf that skopeo
          # rejects. Point it at an empty (valid v2) config instead.
          : > "${RUNNER_TEMP}/registries.conf"
          export CONTAINERS_REGISTRIES_CONF="${RUNNER_TEMP}/registries.conf"

          # Push the same image under both tags; ghcr deduplicates shared blobs.
          for tag in "${SHA_TAG}" "${MOVING_TAG}"; do
            "${COPY}" "docker://${IMAGE}:${tag}" \
              --dest-creds="${REGISTRY_USER}:${REGISTRY_TOKEN}"
          done
