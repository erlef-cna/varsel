name: Release

on:
  push:
    branches:
      - main
      # TODO: remove before merging — only here to test the workflow on the PR branch
      - nix-flake-container
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  container:
    name: Build & Push Container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          # The mix release derivation opts out of the sandbox for network
          # access (hex, npm, tailwind/esbuild downloads, the heroicons git
          # dependency); see nix/release.nix.
          extra_nix_config: sandbox = relaxed
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: devenv

      # Two tags per push: the git SHA as an immutable reference, plus a
      # moving pointer — `main` for the main branch, the tag name (vX.Y.Z)
      # for version tags. github.ref_name is exactly that for both. The
      # image builds once; the second copy-to reuses it from the store, and
      # ghcr deduplicates the shared blobs.
      - name: Build & push to GitHub Container Registry
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          MOVING_TAG: ${{ github.ref_name }}
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The runner ships a v1 /etc/containers/registries.conf that skopeo
          # rejects. Point it at an empty (valid v2) config instead.
          : > "${RUNNER_TEMP}/registries.conf"
          export CONTAINERS_REGISTRIES_CONF="${RUNNER_TEMP}/registries.conf"

          for tag in "${GITHUB_SHA}" "${MOVING_TAG}"; do
            nix run .#copy-to -- \
              "docker://${IMAGE}:${tag}" \
              --dest-creds="${REGISTRY_USER}:${REGISTRY_TOKEN}"
          done
