version: 2
updates:
  - package-ecosystem: mix
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    groups:
      ash:
        patterns:
          - ash
          - ash_*
      phoenix:
        patterns:
          - phoenix
          - phoenix_*

  - package-ecosystem: npm
    directory: /assets
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns:
          - "*"
